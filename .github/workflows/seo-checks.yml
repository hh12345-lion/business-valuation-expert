name: SEO checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate sitemap and robots.txt
        run: npm run seo:generate

      - name: Verify sitemap and robots.txt match inventory
        run: npm run seo:verify
