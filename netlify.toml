[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"

# POST /api/submit-lead is handled by Next.js (webhook + Google Sheets).
# Uncomment only for function-only deploys without app/api/submit-lead/route.ts:
# [[redirects]]
#   from = "/api/submit-lead"
#   to = "/.netlify/functions/submit-lead"
#   status = 200
#   force = true

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"